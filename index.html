<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dompetku - Catatan Keuangan</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2652/2652234.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: rgb(255, 255, 255);
            width: 100%;
            max-width: 450px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0,08);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        .saldo-box {
            background: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        .saldo-box h3 {
            margin: 0;
            font-size: 14px;
            opacity: 0.8;
            text-transform: uppercase;
        }
        .saldo-box h1 {
            margin: 5px 0 0 0;
            font-size: 32px;
        }
        .report-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .report-card {
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            color: white;
        }
        .bg-plus { background-color: #2ecc71; }
        .bg-minus { background-color: #e74c3c; }
        .report-card h4 { margin: 0; font-size: 12px; opacity: 0.9; }
        .report-card p { margin: 5px 0 0 0; font-size: 18px; font-weight: bold; }
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        input, select, button {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .history {
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        .history h3 { margin: 0 0 10px 0; font-size: 16px; color: #555; }
        .list-item {
            display: flex;
            justify-content: space-between;
            background: #f9f9f9;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 14px;
            border-left: 5px solid #ccc;
        }
        .list-item.plus { border-left-color: #2ecc71; }
        .list-item.minus { border-left-color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h2>Dompetku</h2>
    
    <div class="saldo-box">
        <h3>Sisa Saldo</h3>
        <h1 id="total-saldo">Rp 0</h1>
    </div>

    <div class="report-grid">
        <div class="report-card bg-plus">
            <h4>Total Pemasukan</h4>
            <p id="total-pemasukan">Rp 0</p>
        </div>
        <div class="report-card bg-minus">
            <h4>Total Pengeluaran</h4>
            <p id="total-pengeluaran">Rp 0</p>
        </div>
    </div>

    <form id="transaksi-form">
        <input type="text" id="deskripsi" placeholder="Nama transaksi (misal: Gaji, Makan siang)" required>
        <input type="number" id="nominal" placeholder="Nominal (Rp)" required>
        <select id="jenis" required>
            <option value="plus">Pemasukan (+)</option>
            <option value="minus">Pengeluaran (-)</option>
        </select>
        <button type="submit">Tambah Transaksi</button>
    </form>

    <div class="history">
        <h3>Riwayat Transaksi</h3>
        <div id="riwayat-list"></div>
    </div>
</div>

<script>
    const form = document.getElementById('transaksi-form');
    const list = document.getElementById('riwayat-list');
    const totalSaldo = document.getElementById('total-saldo');
    const totalPemasukan = document.getElementById('total-pemasukan');
    const totalPengeluaran = document.getElementById('total-pengeluaran');

    // Mengambil data dari memori HP lokal (localStorage)
    let transaksi = JSON.parse(localStorage.getItem('dompetku_data')) || [];

    function formatRupiah(angka) {
        return 'Rp ' + parseFloat(angka).toLocaleString('id-ID');
    }

    function updateSistem() {
        list.innerHTML = '';
        let pemasukan = 0;
        let pengeluaran = 0;

        transaksi.forEach((item, index) => {
            const div = document.createElement('div');
            div.classList.add('list-item', item.jenis);
            
            const simbol = item.jenis === 'plus' ? '+' : '-';
            div.innerHTML = `
                <span>${item.deskripsi}</span>
                <strong>${simbol} ${formatRupiah(item.nominal)}</strong>
            `;
            list.appendChild(div);

            if(item.jenis === 'plus') {
                pemasukan += parseFloat(item.nominal);
            } else {
                pengeluaran += parseFloat(item.nominal);
            }
        });

        const saldoAkhir = pemasukan - pengeluaran;

        totalSaldo.innerText = formatRupiah(saldoAkhir);
        totalPemasukan.innerText = formatRupiah(pemasukan);
        totalPengeluaran.innerText = formatRupiah(pengeluaran);

        // Simpan data terbaru ke memori HP
        localStorage.setItem('dompetku_data', JSON.stringify(transaksi));
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const dataBaru = {
            deskripsi: document.getElementById('deskripsi').value,
            nominal: document.getElementById('nominal').value,
            jenis: document.getElementById('jenis').value
        };

        transaksi.push(dataBaru);
        updateSistem();
        form.reset();
    });

    // Jalankan sistem saat pertama kali dibuka
    updateSistem();

    // Registrasi Service Worker PWA Biar Bisa Didownload & Offline
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('PWA Siap!', reg))
                .catch(err => console.log('PWA Gagal', err));
        });
    }
</script>

</body>
</html>
